<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Resager Helper</title>
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">
        @theme {
            --color-clifford: #da373d;
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-900">
<div class="max-w-3xl mx-auto p-4">
    <h1 class="text-2xl font-bold mb-4 text-center">Resager Helper v1.963</h1>

    <!-- Вкладки -->
    <div class="flex mb-4 border-b border-gray-300">
        <button id="tab-tracker" class="flex-1 py-2 text-center border-b-2 border-blue-500 font-semibold">Tracker</button>
        <button id="tab-checks" class="flex-1 py-2 text-center border-b-2 border-transparent">Checks</button>
    </div>

    <!-- Вкладка Tracker -->
    <div id="trackerTab">
        <div id="categories" class="space-y-4"></div>
        <button id="addCategory" class="mt-4 px-4 py-2 bg-blue-600 text-white rounded w-full">Добавить категорию</button>
    </div>

    <!-- Вкладка Checks -->
    <div id="checksTab" class="hidden">
        <div id="checkGroups" class="space-y-4"></div>
        <button id="addCheckGroup" class="mt-4 px-4 py-2 bg-green-600 text-white rounded w-full">Добавить группу</button>
    </div>
</div>

<!-- Модальное окно выбора цвета -->
<div id="colorModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center">
    <div class="bg-white p-4 rounded shadow-lg w-80">
        <h2 class="text-lg font-semibold mb-2">Настройки категории</h2>
        <label class="block mb-2">Цвет квадратов:</label>
        <input type="color" id="colorPicker" class="w-full mb-4 border rounded">
        <div class="flex justify-end space-x-2">
            <button id="cancelColor" class="px-4 py-2 border rounded">Отмена</button>
            <button id="saveColor" class="px-4 py-2 bg-blue-600 text-white rounded">Сохранить</button>
        </div>
    </div>
</div>

<!-- Toast -->
<div id="toast" class="fixed bottom-5 left-1/2 -translate-x-1/2 bg-gray-800 text-white px-4 py-2 rounded shadow-lg opacity-0 transition-opacity duration-500 pointer-events-none"></div>

<script src="script.js?v=12435616"></script>
</body>

</html>
